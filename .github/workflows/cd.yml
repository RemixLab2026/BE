name: CD

on:
  push:
    branches:
      - main

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 코드 체크아웃
      - uses: actions/checkout@v3

      # 2️⃣ JDK 세팅 (프로젝트 맞춤: 17로 통일)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ Gradle 캐싱
      - name: Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4️⃣ application-prod.properties 생성
      - name: Make application-prod.properties
        run: |
          mkdir -p ./src/main/resources
          echo "${{ secrets.PROPERTIES_PROD }}" > ./src/main/resources/application-prod.properties
        shell: bash

      # 5️⃣ Gradle build (test 제외)
      - name: Build With Gradle
        run: ./gradlew build -x test

      # 6️⃣ Docker 로그인 (정석 방식)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 7️⃣ Docker 이미지 빌드
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/remixlab:latest .

      # 8️⃣ Docker 이미지 푸시
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/remixlab:latest

      # 9️⃣ GCP 배포
      - name: Deploy to Prod
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_PRIVATE_KEY }}
          script: |
            docker stop remixlab || true
            docker rm remixlab || true

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/remixlab:latest
            echo '${{ secrets.GCP_KEY }}' > /home/rkddnwn135/key.json

            docker run -d \
              --name remixlab \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e MYSQL_URL=${{ secrets.MYSQL_URL }} \
              -e MYSQL_USERNAME=${{ secrets.MYSQL_USERNAME }} \
              -e MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }} \
              -e GCP_BUCKET=${{ secrets.GCP_BUCKET }} \
              -e GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }} \
              -e GOOGLE_APPLICATION_CREDENTIALS=/app/key.json \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
              -v /home/rkddnwn135/key.json:/app/key.json \
              ${{ secrets.DOCKERHUB_USERNAME }}/remixlab:latest
            
            docker image prune -f
